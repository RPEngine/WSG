services:
  - type: web
    name: wyked-samurai-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RENDER_INTERNAL_DATABASE_URL
        sync: false
      - key: PGSSLMODE
        value: require

  - type: static
    name: wyked-samurai-frontend
    rootDir: web
    buildCommand: |
      test -n "$WSG_SUPABASE_URL" || (echo "Missing WSG_SUPABASE_URL" && exit 1)
      test -n "$WSG_SUPABASE_ANON_KEY" || (echo "Missing WSG_SUPABASE_ANON_KEY" && exit 1)
      # Inject runtime Supabase values into the frontend meta tags.
      # This handles both template placeholder values and accidentally blank values.
      sed -i "s|<meta name=\"wsg-supabase-url\" content=\"[^\"]*\" />|<meta name=\"wsg-supabase-url\" content=\"$WSG_SUPABASE_URL\" />|g" index.html
      sed -i "s|<meta name=\"wsg-supabase-anon-key\" content=\"[^\"]*\" />|<meta name=\"wsg-supabase-anon-key\" content=\"$WSG_SUPABASE_ANON_KEY\" />|g" index.html
    staticPublishPath: .
    envVars:
      - key: WSG_SUPABASE_URL
        sync: false
      - key: WSG_SUPABASE_ANON_KEY
        sync: false
