services:
  - type: web
    name: wyked-samurai-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false

  - type: static
    name: wyked-samurai-frontend
    rootDir: web
    buildCommand: |
      test -n "$WSG_SUPABASE_URL" || (echo "Missing WSG_SUPABASE_URL" && exit 1)
      test -n "$WSG_SUPABASE_ANON_KEY" || (echo "Missing WSG_SUPABASE_ANON_KEY" && exit 1)
      sed -i "s|__WSG_SUPABASE_URL__|$WSG_SUPABASE_URL|g" index.html
      sed -i "s|__WSG_SUPABASE_ANON_KEY__|$WSG_SUPABASE_ANON_KEY|g" index.html
    staticPublishPath: .
    envVars:
      - key: WSG_SUPABASE_URL
        sync: false
      - key: WSG_SUPABASE_ANON_KEY
        sync: false
